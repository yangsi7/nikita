# Static fallback registry — Spec 216-B1+B2 (B1.9).
#
# Every (slot, cluster) pair declared in CLUSTER_TAXONOMIES (see
# conversation_prompts.py) MUST have a paired entry below with:
#   - static_fallback_question: the in-character fallback question to ask
#                               when M1 dynamic generation is unavailable
#                               (final retry exhausted, cost circuit active,
#                                or firecrawl tool times out).
#   - why_we_ask: short rationale surfaced to the FE for tooltip / explainer.
#   - control_type: FE control hint (chips / text / slider / toggle / cards).
#
# Lint test: tests/agents/onboarding/test_follow_up_registry_completeness.py
# enforces that every taxonomy node has a fallback entry with all 3 keys.

primary_hobbies:
  aesthete:
    static_fallback_question: "what are you reading or watching that's stuck with you?"
    why_we_ask: "anchors taste — books, films, the slow-burn things"
    control_type: "text"
