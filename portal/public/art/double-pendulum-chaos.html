<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Double Pendulum Chaos — Butterfly Effect Visualized</title>
<style>
  :root { --accent: #f43f5e; --panel: rgba(5,5,12,0.9); }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #02020a; color: #e0e0e0; font-family: 'SF Mono', monospace; overflow: hidden; }
  canvas { display: block; }
  #controls {
    position: fixed; top: 16px; right: 16px; background: var(--panel);
    backdrop-filter: blur(12px); border-radius: 12px; padding: 16px; z-index: 10;
    border: 1px solid rgba(244,63,94,0.2); min-width: 220px;
  }
  #controls h2 { font-size: 13px; letter-spacing: 1px; text-transform: uppercase; color: var(--accent); margin-bottom: 12px; }
  .cr { display: flex; justify-content: space-between; align-items: center; margin-bottom: 7px; font-size: 11px; }
  .cr label { opacity: 0.7; }
  .cr input { width: 100px; accent-color: var(--accent); }
  .cr span { width: 45px; text-align: right; font-variant-numeric: tabular-nums; }
  button {
    padding: 8px; background: var(--accent); color: #fff; border: none;
    border-radius: 6px; cursor: pointer; font-family: inherit; font-size: 11px; font-weight: 600;
  }
  button:hover { filter: brightness(1.15); }
  .btn-row { display: flex; gap: 4px; margin-top: 4px; }
  .btn-row button { flex: 1; }
  #info { position: fixed; bottom: 16px; left: 16px; font-size: 11px; opacity: 0.45; }
  #stats { position: fixed; bottom: 16px; right: 16px; font-size: 11px; opacity: 0.5; text-align: right; }
</style>
</head>
<body>
<div id="controls">
  <h2>Chaos Cloud</h2>
  <div class="cr"><label>Count</label><input type="range" id="count" min="10" max="500" value="200"><span id="cntVal">200</span></div>
  <div class="cr"><label>Divergence</label><input type="range" id="div" min="1" max="100" value="5"><span id="dvVal">1e-5</span></div>
  <div class="cr"><label>Gravity</label><input type="range" id="grav" min="5" max="50" value="25"><span id="gVal">2.5</span></div>
  <div class="cr"><label>Damping</label><input type="range" id="damp" min="95" max="100" value="100" step="1"><span id="dmpVal">1.00</span></div>
  <div class="cr"><label>Trail Length</label><input type="range" id="trail" min="50" max="800" value="300"><span id="trVal">300</span></div>
  <div class="cr"><label>Speed</label><input type="range" id="speed" min="1" max="5" value="1"><span id="spVal">1x</span></div>
  <div class="cr"><label>Angle 1</label><input type="range" id="ang1" min="0" max="360" value="135"><span id="a1Val">135°</span></div>
  <div class="cr"><label>Angle 2</label><input type="range" id="ang2" min="0" max="360" value="180"><span id="a2Val">180°</span></div>
  <div class="btn-row">
    <button id="resetBtn">Reset</button>
    <button id="randomBtn" style="background:#a78bfa">Random</button>
  </div>
  <div class="btn-row">
    <button id="showBobs" style="background:#64748b">Toggle Bobs</button>
    <button id="fadeBtn" style="background:#64748b">Toggle Fade</button>
  </div>
</div>
<div id="info">200 pendulums from near-identical starts · Chaos guarantees divergence</div>
<div id="stats"></div>
<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let W, H, centerX, centerY;

let count = 200, divergence = 1e-5, g = 2.5, damping = 1.0, trailLen = 300, speed = 1;
let initialA1 = Math.PI * 135 / 180, initialA2 = Math.PI * 180 / 180;
let showBobs = true, fadeMode = true;
let pendulums = [];
const L1 = 140, L2 = 120, M1 = 10, M2 = 10;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  centerX = W / 2; centerY = H * 0.38;
  ctx.fillStyle = '#02020a'; ctx.fillRect(0, 0, W, H);
}
window.addEventListener('resize', resize);
resize();

class Pendulum {
  constructor(a1, a2, hue) {
    this.a1 = a1; this.a2 = a2;
    this.w1 = 0; this.w2 = 0;
    this.hue = hue;
    this.trail = [];
  }

  // Equations of motion for double pendulum (Lagrangian)
  derivatives() {
    const num1 = -g * (2 * M1 + M2) * Math.sin(this.a1);
    const num2 = -M2 * g * Math.sin(this.a1 - 2 * this.a2);
    const num3 = -2 * Math.sin(this.a1 - this.a2) * M2;
    const num4 = this.w2 * this.w2 * L2 + this.w1 * this.w1 * L1 * Math.cos(this.a1 - this.a2);
    const den = L1 * (2 * M1 + M2 - M2 * Math.cos(2 * this.a1 - 2 * this.a2));
    const alpha1 = (num1 + num2 + num3 * num4) / den;

    const n1 = 2 * Math.sin(this.a1 - this.a2);
    const n2 = this.w1 * this.w1 * L1 * (M1 + M2);
    const n3 = g * (M1 + M2) * Math.cos(this.a1);
    const n4 = this.w2 * this.w2 * L2 * M2 * Math.cos(this.a1 - this.a2);
    const den2 = L2 * (2 * M1 + M2 - M2 * Math.cos(2 * this.a1 - 2 * this.a2));
    const alpha2 = (n1 * (n2 + n3 + n4)) / den2;

    return [this.w1, this.w2, alpha1, alpha2];
  }

  // RK4 integration for accuracy
  step(dt) {
    const y0 = [this.a1, this.a2, this.w1, this.w2];
    const save = { a1: this.a1, a2: this.a2, w1: this.w1, w2: this.w2 };

    const k1 = this.derivatives();

    this.a1 = save.a1 + k1[0] * dt/2; this.a2 = save.a2 + k1[1] * dt/2;
    this.w1 = save.w1 + k1[2] * dt/2; this.w2 = save.w2 + k1[3] * dt/2;
    const k2 = this.derivatives();

    this.a1 = save.a1 + k2[0] * dt/2; this.a2 = save.a2 + k2[1] * dt/2;
    this.w1 = save.w1 + k2[2] * dt/2; this.w2 = save.w2 + k2[3] * dt/2;
    const k3 = this.derivatives();

    this.a1 = save.a1 + k3[0] * dt; this.a2 = save.a2 + k3[1] * dt;
    this.w1 = save.w1 + k3[2] * dt; this.w2 = save.w2 + k3[3] * dt;
    const k4 = this.derivatives();

    this.a1 = save.a1 + dt/6 * (k1[0] + 2*k2[0] + 2*k3[0] + k4[0]);
    this.a2 = save.a2 + dt/6 * (k1[1] + 2*k2[1] + 2*k3[1] + k4[1]);
    this.w1 = (save.w1 + dt/6 * (k1[2] + 2*k2[2] + 2*k3[2] + k4[2])) * damping;
    this.w2 = (save.w2 + dt/6 * (k1[3] + 2*k2[3] + 2*k3[3] + k4[3])) * damping;

    // Track end-of-second-pendulum position for trail
    const x2 = centerX + L1 * Math.sin(this.a1) + L2 * Math.sin(this.a2);
    const y2 = centerY + L1 * Math.cos(this.a1) + L2 * Math.cos(this.a2);
    this.trail.push(x2, y2);
    if (this.trail.length > trailLen * 2) this.trail.splice(0, this.trail.length - trailLen * 2);
  }

  drawTrail() {
    if (this.trail.length < 4) return;
    const len = this.trail.length / 2;
    ctx.strokeStyle = `hsl(${this.hue}, 80%, 55%)`;
    ctx.lineWidth = 1.2;
    ctx.lineCap = 'round';
    ctx.beginPath();
    for (let i = 0; i < len; i++) {
      const x = this.trail[i * 2], y = this.trail[i * 2 + 1];
      if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    }
    ctx.globalAlpha = 0.6;
    ctx.stroke();
    ctx.globalAlpha = 1;
  }

  drawBobs() {
    const x1 = centerX + L1 * Math.sin(this.a1);
    const y1 = centerY + L1 * Math.cos(this.a1);
    const x2 = x1 + L2 * Math.sin(this.a2);
    const y2 = y1 + L2 * Math.cos(this.a2);
    ctx.strokeStyle = `hsla(${this.hue}, 80%, 70%, 0.25)`;
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(centerX, centerY);
    ctx.lineTo(x1, y1);
    ctx.lineTo(x2, y2);
    ctx.stroke();
    ctx.fillStyle = `hsla(${this.hue}, 90%, 70%, 0.5)`;
    ctx.beginPath(); ctx.arc(x2, y2, 1.5, 0, Math.PI * 2); ctx.fill();
  }
}

function initPendulums() {
  pendulums = [];
  ctx.fillStyle = '#02020a'; ctx.fillRect(0, 0, W, H);
  for (let i = 0; i < count; i++) {
    const delta = (i / count) * divergence;
    const hue = (i / count) * 360;
    pendulums.push(new Pendulum(initialA1 + delta, initialA2 + delta, hue));
  }
}

document.getElementById('count').addEventListener('input', e => { count = parseInt(e.target.value); document.getElementById('cntVal').textContent = count; });
document.getElementById('div').addEventListener('input', e => { divergence = parseFloat(e.target.value) * 1e-5; document.getElementById('dvVal').textContent = divergence.toExponential(0); });
document.getElementById('grav').addEventListener('input', e => { g = e.target.value / 10; document.getElementById('gVal').textContent = g.toFixed(1); });
document.getElementById('damp').addEventListener('input', e => { damping = e.target.value / 100; document.getElementById('dmpVal').textContent = damping.toFixed(2); });
document.getElementById('trail').addEventListener('input', e => { trailLen = parseInt(e.target.value); document.getElementById('trVal').textContent = trailLen; });
document.getElementById('speed').addEventListener('input', e => { speed = parseInt(e.target.value); document.getElementById('spVal').textContent = speed + 'x'; });
document.getElementById('ang1').addEventListener('input', e => { initialA1 = parseInt(e.target.value) * Math.PI / 180; document.getElementById('a1Val').textContent = e.target.value + '°'; });
document.getElementById('ang2').addEventListener('input', e => { initialA2 = parseInt(e.target.value) * Math.PI / 180; document.getElementById('a2Val').textContent = e.target.value + '°'; });
document.getElementById('resetBtn').addEventListener('click', initPendulums);
document.getElementById('randomBtn').addEventListener('click', () => {
  initialA1 = Math.random() * Math.PI * 2;
  initialA2 = Math.random() * Math.PI * 2;
  document.getElementById('ang1').value = Math.round(initialA1 * 180 / Math.PI);
  document.getElementById('ang2').value = Math.round(initialA2 * 180 / Math.PI);
  document.getElementById('a1Val').textContent = Math.round(initialA1 * 180 / Math.PI) + '°';
  document.getElementById('a2Val').textContent = Math.round(initialA2 * 180 / Math.PI) + '°';
  initPendulums();
});
document.getElementById('showBobs').addEventListener('click', () => showBobs = !showBobs);
document.getElementById('fadeBtn').addEventListener('click', () => fadeMode = !fadeMode);

initPendulums();

function animate() {
  if (fadeMode) {
    ctx.fillStyle = 'rgba(2,2,10,0.04)';
    ctx.fillRect(0, 0, W, H);
  }

  const dt = 0.08 * speed;
  for (let s = 0; s < 2 * speed; s++) {
    for (const p of pendulums) p.step(dt);
  }

  // Draw trails as lines from previous to current (cheaper than redrawing full trail)
  for (const p of pendulums) {
    if (p.trail.length >= 4) {
      const len = p.trail.length;
      ctx.strokeStyle = `hsla(${p.hue}, 85%, 60%, 0.7)`;
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(p.trail[len - 4], p.trail[len - 3]);
      ctx.lineTo(p.trail[len - 2], p.trail[len - 1]);
      ctx.stroke();
    }
  }

  if (showBobs) {
    for (const p of pendulums) p.drawBobs();
  }

  // Compute divergence metric
  if (pendulums.length >= 2) {
    const p0 = pendulums[0], pN = pendulums[pendulums.length - 1];
    const x1 = centerX + L1 * Math.sin(p0.a1) + L2 * Math.sin(p0.a2);
    const y1 = centerY + L1 * Math.cos(p0.a1) + L2 * Math.cos(p0.a2);
    const x2 = centerX + L1 * Math.sin(pN.a1) + L2 * Math.sin(pN.a2);
    const y2 = centerY + L1 * Math.cos(pN.a1) + L2 * Math.cos(pN.a2);
    const sep = Math.sqrt((x1-x2)**2 + (y1-y2)**2);
    document.getElementById('stats').textContent = `${count} pendulums · max sep ${sep.toFixed(1)}px`;
  }

  requestAnimationFrame(animate);
}
animate();
</script>
</body>
</html>
